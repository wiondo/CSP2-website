<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano and Art - Piano</title>
  <link rel="stylesheet" href="style2.css">
  <script src="piano.js"></script>
</head>
<body class="piano-page-body">
  <main class="piano-page">
    <section class="piano-wrapper">
      <div class="piano">

        <button class="white-key" id="do">도(a)</button>
        <button class="black-key black-1" id="do-sharp" aria-label="도 샵"></button>

        <button class="white-key" id="re">레(s)</button>
        <button class="black-key black-2" id="re-sharp" aria-label="레 샵"></button>

        <button class="white-key" id="mi">미(d)</button>

        <button class="white-key" id="fa">파(f)</button>
        <button class="black-key black-3" id="fa-sharp" aria-label="파 샵"></button>

        <button class="white-key" id="sol">솔(g)</button>
        <button class="black-key black-4" id="sol-sharp" aria-label="솔 샵"></button>

        <button class="white-key" id="la">라(h)</button>
        <button class="black-key black-5" id="la-sharp" aria-label="라 샵"></button>

        <button class="white-key" id="si">시(j)</button>

        <button class="white-key" id="high-do">도(k)</button>
        <button class="black-key black-6" id="high-do-sharp" aria-label="높은 도 샵"></button>

        <button class="white-key" id="high-re">레(l)</button>
        <button class="black-key black-7" id="high-re-sharp" aria-label="높은 레 샵"></button>

        <button class="white-key" id="high-mi">미(&#59;)</button>

      </div>
      <section class="note-history">
        <p>기록은 10번째 까지만 됩니다.</p>
        <h2>Play History</h2>
        <div id="history-list"></div>
      </section>
    </section>
  </main>
</body>
</html>
